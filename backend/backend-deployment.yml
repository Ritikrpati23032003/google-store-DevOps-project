apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 301678011164.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:0dd74e7545ce1aa1885df9e37f6aaf6a1742fa47
          ports:
            - containerPort: 5000
