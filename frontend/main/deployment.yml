apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 301678011164.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:0dd74e7545ce1aa1885df9e37f6aaf6a1742fa47
        ports:
        - containerPort: 80

