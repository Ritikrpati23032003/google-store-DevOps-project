apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 301678011164.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:0dd74e7545ce1aa1885df9e37f6aaf6a1742fa47
        ports:
        - containerPort: 80
